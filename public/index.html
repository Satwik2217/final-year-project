<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> NeuroWell - Beyond Generative AI </title>

    <link rel="shortcut icon" href="./assets/img/logo.ico" type="image/x-icon">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


    <!-- Particle js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/modernizr/2.8.3/modernizr.min.js"
        type="text/javascript"></script>

    <!-- Texllate -->
    <link rel="stylesheet" href="./assets/vendore/texllate/animate.css
    ">

    <link rel="stylesheet" href="./css/style.css">

</head>

<body>
    <nav>
        <button id="loginBtn"> login </button>
        <button id="signupBtn"> sign up </button>
        <button id="logoutBtn"> logout </button>
    </nav>
    <div class="authentication">
        <form class="login hidden" id="loginForm">
            <h2>Welcome Back</h2>
            <p>Login to your account</p>
            <input type="userid" placeholder="Enter user id" name="userid">
            <input type="password" placeholder="Enter password" name="password">
            <button type="submit" name="submit">Submit</button>
            <button type="button" id="closeLogin">Close</button>

        </form>
        <form class="signup hidden" id="signupForm">
            <h2>Create Account</h2>
            <p>Join us today</p>
            <input type="text" name="username" placeholder="Enter your username">
            <input type="userid" placeholder="Enter your email id" name="emailid">
            <input type="password" placeholder="Enter password" name="password">
            <button type="submit" name="submit">Submit</button>
            <button type="button" id="closeSignup">Close</button>
        </form>
    </div>

    <div class="container">

        <section id="Oval" class="mb-4">

            <div class="row">
                <div class="col-md-1"></div>
                <div class="col-md-10">
                    <div class="d-flex justify-content-center align-items-center" style="height: 80vh;">
                        <canvas id="canvasOne" width="700px" height="420px" style="position: absolute;"></canvas>
                        <div class="JarvisHood">
                            <div class="square">
                                <span class="circle"></span>
                                <span class="circle"></span>
                                <span class="circle"></span>
                            </div>
                        </div>
                    </div>
                    <h5 class="text-light text text-center">Ask me anything</h5>

                    <div class="col-md-12 mt-4 pt-4">
                        <div class="text-center">
                            <div id="TextInput" class="d-flex">
                                <input type="text" id="chatbox" name="chatbox" placeholder="ask me anything"
                                    class="input-field">
                                <button id="MicBtn" class="glow-on-hover"><i class="bi bi-mic"></i></button>
                                <button id="cameraToggle" class="glow-on-hover">
                                    <i class="bi bi-camera-video"></i>
                                </button>
                                <button id="ChatBtn" class="glow-on-hover"><i class="bi bi-chat-dots"></i></button>
                                <button id="SettingBtn" class="glow-on-hover"><i
                                        class="bi bi-gear-wide-connected"></i></i></button>
                            </div>
                        </div>
                    </div>

                </div>
                <div class="col-md-1"></div>
            </div>
    </div>
    <video id="webcam" autoplay playsinline></video>


    <!--Jquery  -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>


    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>

    <!-- Particle js -->
    <!-- Particle js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jqueryui/1.11.2/jquery-ui.min.js"></script>

    <script src="./js/script.js"></script>


    <!-- Texllate -->
    <script src="assets/vendore/texllate/jquery.fittext.js"></script>
    <script src="assets/vendore/texllate/jquery.lettering.js"></script>
    <!-- Texllate -->
    <script src="http://jschr.github.io/textillate/jquery.textillate.js"></script>

    <script src="./js/auth.js"></script>

    <script src="./js/main.js"></script>

</body>

</html>
